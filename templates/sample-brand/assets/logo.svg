<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40" role="img" aria-label="Nimbus">
  <title>Nimbus</title>
  <desc>Nimbus wordmark — geometric N mark in cobalt next to the brand name in Inter-like letterforms.</desc>

  <!-- Mark: a rounded-square tile with a bold N glyph carved out -->
  <g transform="translate(4, 4)">
    <rect x="0" y="0" width="32" height="32" rx="8" ry="8" fill="#4A6FF5"/>
    <!-- N strokes: two verticals + a diagonal, drawn as paths so they stay crisp at any size -->
    <path d="M 9 8 L 9 24 M 23 8 L 23 24 M 9 8 L 23 24" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark "Nimbus" rendered as vector letters (paths, no font dependency) -->
  <g transform="translate(48, 27)" fill="#0F1419">
    <!-- N -->
    <path d="M 0 -15 L 0 0 L 2.6 0 L 2.6 -10.3 L 10.4 0 L 13.0 0 L 13.0 -15 L 10.4 -15 L 10.4 -4.7 L 2.6 -15 Z"/>
    <!-- i -->
    <path d="M 16.6 -15 L 19.0 -15 L 19.0 -12.5 L 16.6 -12.5 Z M 16.6 -10.8 L 19.0 -10.8 L 19.0 0 L 16.6 0 Z"/>
    <!-- m -->
    <path d="M 22.0 -10.8 L 24.3 -10.8 L 24.3 -9.2 C 25.0 -10.3 26.0 -11.0 27.4 -11.0 C 28.9 -11.0 30.0 -10.3 30.6 -9.1 C 31.4 -10.3 32.6 -11.0 34.1 -11.0 C 36.3 -11.0 37.7 -9.5 37.7 -7.0 L 37.7 0 L 35.3 0 L 35.3 -6.6 C 35.3 -8.1 34.6 -9.0 33.3 -9.0 C 32.0 -9.0 31.1 -8.0 31.1 -6.4 L 31.1 0 L 28.7 0 L 28.7 -6.6 C 28.7 -8.1 28.0 -9.0 26.7 -9.0 C 25.4 -9.0 24.4 -8.0 24.4 -6.4 L 24.4 0 L 22.0 0 Z"/>
    <!-- b -->
    <path d="M 41.4 -16 L 43.8 -16 L 43.8 -9.3 C 44.6 -10.4 45.9 -11.0 47.3 -11.0 C 49.9 -11.0 52.0 -8.9 52.0 -5.4 C 52.0 -1.9 49.9 0.2 47.3 0.2 C 45.9 0.2 44.6 -0.4 43.8 -1.6 L 43.8 0 L 41.4 0 Z M 46.7 -1.8 C 48.4 -1.8 49.6 -3.2 49.6 -5.4 C 49.6 -7.6 48.4 -9.0 46.7 -9.0 C 45.0 -9.0 43.8 -7.6 43.8 -5.4 C 43.8 -3.2 45.0 -1.8 46.7 -1.8 Z"/>
    <!-- u -->
    <path d="M 55.3 -10.8 L 57.7 -10.8 L 57.7 -4.2 C 57.7 -2.7 58.5 -1.8 59.9 -1.8 C 61.3 -1.8 62.3 -2.8 62.3 -4.4 L 62.3 -10.8 L 64.7 -10.8 L 64.7 0 L 62.4 0 L 62.4 -1.5 C 61.7 -0.4 60.6 0.2 59.2 0.2 C 56.8 0.2 55.3 -1.4 55.3 -3.9 Z"/>
    <!-- s -->
    <path d="M 67.7 -2.1 L 70.0 -2.8 C 70.3 -1.9 71.2 -1.4 72.4 -1.4 C 73.6 -1.4 74.3 -1.8 74.3 -2.5 C 74.3 -3.2 73.8 -3.4 72.5 -3.7 L 71.3 -4.0 C 68.9 -4.5 67.9 -5.5 67.9 -7.3 C 67.9 -9.5 69.6 -11.0 72.3 -11.0 C 74.7 -11.0 76.3 -9.9 76.8 -8.2 L 74.6 -7.5 C 74.3 -8.4 73.5 -8.9 72.3 -8.9 C 71.2 -8.9 70.4 -8.4 70.4 -7.6 C 70.4 -7.0 70.9 -6.7 72.1 -6.4 L 73.3 -6.1 C 75.9 -5.5 76.8 -4.7 76.8 -2.9 C 76.8 -0.7 75.0 0.2 72.3 0.2 C 69.8 0.2 68.2 -0.6 67.7 -2.1 Z"/>
